<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceVote - Register</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="glass-card">
            <div class="card-header">
                <h1>Register</h1>
            </div>
            <p class="subtitle" style="text-align: center; margin-bottom: 20px; color: #cbd5e1;">Join the galaxy of
                decision makers</p>

            <form id="register-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn primary-btn" style="padding: 24px; font-size: 1.4rem;">
                    <span>Explore Space</span>
                    <i class="arrow-icon btn-icon">→</i>
                </button>
            </form>

            <div class="register-link" style="text-align: center; margin-top: 20px;">
                <p>Already have an account? <a href="./index.html"
                        style="color: var(--secondary); text-decoration: none; font-weight: 600;">Log In</a></p>
            </div>
            <div id="error-message" class="error-msg"></div>
        </div>
    </div>

    <script src="./js/register.js"></script>
</body>

</html>
