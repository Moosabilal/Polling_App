<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Polling & Chat - Login</title>
  <link rel="stylesheet" href="./css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="background-animation">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <div class="login-container">
    <div class="glass-card">
      <div class="card-header">
        <h1>Welcome</h1>
        <p>Join the conversation and cast your vote.</p>
      </div>
      <form id="login-form" novalidate>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn primary-btn" style="padding: 24px; font-size: 1.4rem;">
          <span>Enter Space</span>
          <i class="arrow-icon btn-icon">→</i>
        </button>
      </form>

      <div class="register-link" style="text-align: center; margin-top: 20px;">
        <p>Don't have an account? <a href="./register.html"
            style="color: var(--secondary); text-decoration: none; font-weight: 600;">Register Now</a></p>
      </div>
      <div id="error-message" class="error-msg"></div>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>

</html>
