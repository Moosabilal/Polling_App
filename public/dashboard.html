<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Polling & Chat - Dashboard</title>
    <link rel="stylesheet" href="./css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Load Socket.IO client from the server -->
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>
    <!-- Animated Background Shapes -->
    <div class="background-animation">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div class="dashboard-wrapper">
        <header class="dashboard-header glass-panel">
            <div class="logo">
                <span class="logo-icon">✨</span> SpaceVote
            </div>
            <div class="user-info">
                <span id="current-username">Guest</span>
                <button id="logout-btn" class="btn outline-btn">Logout</button>
            </div>
        </header>

        <main class="dashboard-content">
            <!-- Vertical Pagination Sidebar -->
            <aside class="poll-sidebar glass-panel">
                <ul id="poll-pagination" class="poll-pagination-list">
                    <!-- Pagination numbers injected here -->
                </ul>
            </aside>

            <!-- Polling Section -->
            <section class="polling-section glass-panel">
                <div class="section-header">
                    <h2>📊 Live Poll</h2>
                    <div class="poll-header-actions">
                        <button id="nav-create-poll-btn" class="btn outline-btn btn-small">+ New</button>
                    </div>
                </div>

                <div id="poll-container" class="poll-container">
                    <h3 id="poll-question" class="poll-question">Loading poll...</h3>
                    <div id="poll-options" class="poll-options">
                        <!-- Options will be injected here via JS -->
                    </div>
                    <div class="total-votes">
                        Total Votes: <span id="total-votes-count">0</span>
                    </div>
                </div>
            </section>

            <!-- Chat Section -->
            <section class="chat-section glass-panel">
                <div class="section-header">
                    <h2>💬 Community Chat</h2>
                    <span class="online-count"><span class="dot"></span> Online</span>
                </div>

                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        <!-- Messages injected here via JS -->
                    </div>
                    <div id="typing-indicator" class="typing-indicator">
                        <!-- Typing indicators go here -->
                    </div>
                    <form id="chat-form" class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" class="btn primary-btn send-btn">
                            <span class="send-icon">➤</span>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Create Poll Modal -->
    <div id="create-poll-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>📝 Create New Poll</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>

            <div class="create-poll-container">
                <input type="text" id="new-poll-question" placeholder="Ask a question..." class="poll-input">
                <div id="new-poll-options" class="new-poll-options">
                    <input type="text" class="poll-input option-input" placeholder="Option 1">
                    <input type="text" class="poll-input option-input" placeholder="Option 2">
                </div>
                <div class="create-poll-actions">
                    <button id="add-option-btn" class="text-btn">+ Add Option</button>
                    <div class="action-buttons">
                        <button id="submit-poll-btn" class="btn primary-btn" style="padding: 10px 20px;">Launch
                            Poll</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/dashboard.js"></script>
</body>

</html>
