name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Type Check
      # Checks for SOLID/TypeScript errors without emitting files
      run: npx tsc --noEmit

    - name: Production Build
      # This ensures your "dist" folder can be successfully generated
      # This is critical before the CD step tries to deploy it
      run: npm run build
      